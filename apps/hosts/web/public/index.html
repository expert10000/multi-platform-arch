<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>DZONE Web Host</title>
    <link rel="stylesheet" href="/web/styles.css">
  </head>
  <body>
    <header class="host-topbar">
      <div>
        <p class="eyebrow">Web Host</p>
        <h1>Workspace Portal</h1>
      </div>
      <nav class="host-nav" aria-label="Host navigation">
        <a href="/admin/">Admin</a>
        <span id="runtimeStatus">Checking runtime</span>
      </nav>
    </header>

    <main class="host-shell">
      <aside class="workspace-rail">
        <section class="panel">
          <div class="panel-header">
            <h2>Workspaces</h2>
            <span class="counter" id="workspaceCount">0</span>
          </div>
          <form class="workspace-form" id="workspaceForm">
            <label>
              Workspace
              <input id="workspaceName" name="name" required autocomplete="off">
            </label>
            <button type="submit">Create</button>
          </form>
          <div class="workspace-list" id="workspaceList"></div>
        </section>
      </aside>

      <section class="host-main">
        <section class="summary-band">
          <div>
            <p class="eyebrow" id="activeWorkspaceLabel">No workspace selected</p>
            <h2 id="activeWorkspaceName">Documents</h2>
          </div>
          <div class="summary-metrics">
            <div><strong id="documentCount">0</strong><span>Documents</span></div>
            <div><strong id="jobCount">0</strong><span>Jobs</span></div>
            <div><strong id="fileCount">0</strong><span>Files</span></div>
          </div>
        </section>

        <section class="panel document-composer">
          <div class="panel-header">
            <h2>New Document</h2>
          </div>
          <form id="documentForm" class="document-form">
            <label>
              Title
              <input id="documentTitle" name="title" required autocomplete="off">
            </label>
            <label>
              Tags
              <input id="documentTags" name="tags" autocomplete="off" placeholder="design, proposal">
            </label>
            <button type="submit">Add Document</button>
          </form>
        </section>

        <section class="panel">
          <div class="panel-header">
            <h2>Documents</h2>
            <button class="secondary" id="refreshButton" type="button">Refresh</button>
          </div>
          <div class="document-grid" id="documentGrid"></div>
          <div class="empty" id="documentEmpty">Create or select a workspace to begin.</div>
        </section>

        <section class="panel">
          <div class="panel-header">
            <h2>Jobs</h2>
          </div>
          <div class="job-board" id="jobBoard"></div>
        </section>
      </section>
    </main>

    <div class="toast" id="toast" role="status" aria-live="polite"></div>
    <script type="module" src="/web/app.js"></script>
  </body>
</html>
